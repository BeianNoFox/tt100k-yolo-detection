experiment: "exp3_longtail"
description: "Tiling (best overlap) + long-tail handling (oversample + class weight + mosaic)"
model: "yolov8s.pt"
data: "data/processed/yolo_tiled/dataset.yaml"
imgsz: 640
epochs: 200
patience: 10
batch: 128
lr0: 0.001
optimizer: "AdamW"
pretrained: true
device: "cuda:0"
workers: 16
tiling:
  enabled: true
  tile_size: 640
  overlap: 0.2
augment:
  mosaic: 0.5
  mixup: 0.2
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  flipud: 0.0
  fliplr: 0.5
long_tail:
  oversample: true
  oversample_threshold: 200
  oversample_multiplier: [3, 5, 10]
  class_weight_loss: true
